services:
  ml_backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ml_backend_container
    ports:
      - "8000:8000"

  ml_frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ml_frontend_container
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://ml_backend:8000
    depends_on:
      - ml_backend